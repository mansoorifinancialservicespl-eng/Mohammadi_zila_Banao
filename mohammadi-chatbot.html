<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>मोहम्मदी ज़िला बनाओ — AI Chatbot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --saffron: #FF6B00;
    --deep-green: #1a6b3a;
    --navy: #0f1f3d;
    --cream: #fff8f0;
    --white: #ffffff;
    --shadow: rgba(255,107,0,0.15);
  }

  body {
    font-family: 'Inter', 'Noto Sans Devanagari', sans-serif;
    background: linear-gradient(135deg, #0f1f3d 0%, #1a3a5c 50%, #1a6b3a 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 16px;
    color: white;
  }
  .header .flag-strip {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 8px;
  }
  .flag-strip span {
    width: 32px; height: 6px; border-radius: 3px;
  }
  .flag-strip .s { background: #FF9933; }
  .flag-strip .w { background: white; }
  .flag-strip .g { background: #138808; }

  .header h1 {
    font-family: 'Noto Sans Devanagari', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #FF9933;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    line-height: 1.3;
  }
  .header p {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    margin-top: 4px;
  }

  /* Chat container */
  .chat-container {
    width: 100%;
    max-width: 420px;
    background: var(--white);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,107,0,0.2);
    display: flex;
    flex-direction: column;
    height: 520px;
  }

  /* Chat header */
  .chat-header {
    background: linear-gradient(135deg, #FF6B00, #e65c00);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .bot-avatar {
    width: 42px; height: 42px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    border: 2px solid rgba(255,255,255,0.4);
    flex-shrink: 0;
  }
  .bot-info h3 {
    color: white;
    font-size: 14px;
    font-weight: 600;
  }
  .bot-info .status {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: rgba(255,255,255,0.85);
    margin-top: 2px;
  }
  .status-dot {
    width: 7px; height: 7px;
    background: #4ade80;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Messages area */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
    background: #f7f3ee;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

  /* Message bubbles */
  .msg {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.bot { justify-content: flex-start; }
  .msg.user { justify-content: flex-end; }

  .msg-avatar {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #FF6B00, #e65c00);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }

  .bubble {
    max-width: 78%;
    padding: 10px 13px;
    border-radius: 16px;
    font-size: 13px;
    line-height: 1.55;
  }
  .msg.bot .bubble {
    background: white;
    color: #1a1a1a;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, #FF6B00, #e65c00);
    color: white;
    border-bottom-right-radius: 4px;
  }

  /* Quick reply buttons */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px 12px 4px;
    background: #f7f3ee;
  }
  .qr-btn {
    background: white;
    border: 1.5px solid #FF6B00;
    color: #FF6B00;
    padding: 7px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    font-weight: 500;
  }
  .qr-btn:hover, .qr-btn:active {
    background: #FF6B00;
    color: white;
    transform: scale(0.97);
  }

  /* Typing indicator */
  .typing {
    display: flex; align-items: center; gap: 4px;
    padding: 10px 13px;
    background: white;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    width: fit-content;
  }
  .typing span {
    width: 7px; height: 7px;
    background: #FF6B00;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Input area */
  .input-area {
    padding: 10px 12px;
    background: white;
    border-top: 1px solid #f0ebe4;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .input-area input {
    flex: 1;
    border: 1.5px solid #e8e0d8;
    border-radius: 22px;
    padding: 10px 14px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    background: #faf7f4;
    color: #1a1a1a;
    transition: border 0.2s;
  }
  .input-area input:focus {
    border-color: #FF6B00;
    background: white;
  }
  .input-area input::placeholder { color: #bbb; }
  .send-btn {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #FF6B00, #e65c00);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover { transform: scale(1.08); }
  .send-btn svg { width: 18px; height: 18px; fill: white; }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 12px;
    color: rgba(255,255,255,0.5);
    font-size: 11px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="flag-strip">
    <span class="s"></span><span class="w"></span><span class="g"></span>
  </div>
  <h1>मोहम्मदी ज़िला बनाओ 🏙️</h1>
  <p>आंदोलन सहायक — 24/7 उपलब्ध</p>
</div>

<div class="chat-container">
  <div class="chat-header">
    <div class="bot-avatar">🤖</div>
    <div class="bot-info">
      <h3>ज़िला सहायक</h3>
      <div class="status">
        <div class="status-dot"></div>
        अभी ऑनलाइन है
      </div>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="quick-replies" id="quickReplies"></div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="अपना सवाल यहाँ लिखें..." />
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<div class="footer">Mohammadi Zila Banao — आवाज़ उठाओ, साथ दो ✊</div>

<script>
const RESPONSES = {
  greeting: {
    text: `नमस्ते! 🙏 मैं मोहम्मदी ज़िला आंदोलन का सहायक हूँ।\n\nमैं आपकी इन विषयों में मदद कर सकता हूँ:\n\n📢 मोहम्मदी ज़िला आंदोलन की जानकारी\n👥 Page Follow & Share करना\n📝 Petition Sign करना\n\nआप क्या जानना चाहते हैं?`,
    quick: ["आंदोलन के बारे में", "Page Follow करें", "Petition Sign करें", "Share कैसे करें?"]
  },
  andolan: {
    text: `✊ मोहम्मदी ज़िला आंदोलन\n\n📍 मोहम्मदी, लखीमपुर खीरी (UP) को अलग ज़िला बनाने की माँग है।\n\n🎯 हमारी माँग:\n• मोहम्मदी को स्वतंत्र ज़िला घोषित किया जाए\n• स्थानीय लोगों को बेहतर सुविधाएँ मिलें\n• विकास तेज़ी से हो\n\n"बदलेगा मोहम्मदी - बढ़ेंगे हम" 🏙️\n\nआप इस आंदोलन से जुड़ना चाहते हैं?`,
    quick: ["हाँ, जुड़ना चाहता हूँ!", "Petition Sign करें", "Page Follow करें", "और जानकारी"]
  },
  follow: {
    text: `👉 हमारा Facebook Page Follow करें!\n\n🔗 facebook.com/mohammadi.zila.banao\n\nPage Follow करने से:\n✅ हर नई खबर सबसे पहले मिलेगी\n✅ आंदोलन की progress पता चलेगी\n✅ आप इस आंदोलन का हिस्सा बनेंगे\n\n📲 अभी Facebook Page पर जाएँ और Follow करें!\n\nक्या आपने Page Follow कर लिया? 😊`,
    quick: ["हाँ, Follow कर लिया! ✅", "Petition Sign करें", "Share कैसे करें?", "वापस जाएँ"]
  },
  petition: {
    text: `📝 Petition Sign करें — आपकी आवाज़ ज़रूरी है!\n\n✍️ Petition link:\nchange.org/mohammadi-zila-banao\n\nPetition Sign करने से:\n✅ सरकार तक आवाज़ पहुँचेगी\n✅ आंदोलन मज़बूत होगा\n✅ बदलाव जल्दी आएगा\n\n👆 Link पर click करें और अपना नाम दर्ज करें।\n\nसाथियों को भी share करें! 🙏`,
    quick: ["Sign कर लिया! ✅", "Share कैसे करें?", "Page Follow करें", "वापस जाएँ"]
  },
  share: {
    text: `📤 इस आंदोलन को Share करें!\n\n🔁 Facebook Post Share करें:\n• हमारी कोई भी post खोलें\n• Share button दबाएँ\n• अपने friends को tag करें\n\n📱 WhatsApp पर भेजें:\n• Page का link copy करें\n• अपने सभी groups में भेजें\n\n💬 यह message copy करें:\n"मोहम्मदी को ज़िला बनाओ! इस आंदोलन से जुड़ें 👉 facebook.com/mohammadi.zila.banao"\n\nहर share से आंदोलन मज़बूत होता है! 💪`,
    quick: ["Page Follow करें", "Petition Sign करें", "आंदोलन के बारे में", "शुक्रिया! 🙏"]
  },
  joined: {
    text: `वाह! बहुत बढ़िया! 🎉\n\nआप इस आंदोलन का अहम हिस्सा हैं!\n\nअब आगे:\n✅ Page Follow करें (अगर नहीं किया)\n✅ Petition Sign करें\n✅ दोस्तों को Share करें\n\n"एक-एक आवाज़ मिलकर तूफ़ान बनती है" 🌊\n\nधन्यवाद! मोहम्मदी ज़िला ज़रूर बनेगा! ✊🏙️`,
    quick: ["Petition Sign करें", "Share करें", "Page Follow करें", "और जानकारी"]
  },
  thanks: {
    text: `आपका बहुत-बहुत शुक्रिया! 🙏❤️\n\nआपके जैसे साथियों की वजह से यह आंदोलन आगे बढ़ रहा है।\n\n✊ मोहम्मदी ज़िला ज़रूर बनेगा!\n\nकोई और सवाल हो तो पूछें 😊`,
    quick: ["आंदोलन के बारे में", "Page Follow करें", "Petition Sign करें", "Share करें"]
  },
  default: {
    text: `मैं समझ गया। 😊\n\nमैं आपकी इन विषयों में मदद कर सकता हूँ:\n\n📢 मोहम्मदी ज़िला आंदोलन\n👥 Page Follow & Share\n📝 Petition Sign करना\n\nनीचे दिए buttons से जल्दी जानकारी पाएँ! 👇`,
    quick: ["आंदोलन के बारे में", "Page Follow करें", "Petition Sign करें", "Share कैसे करें?"]
  }
};

function getResponse(text) {
  const t = text.toLowerCase();
  if (t.includes("नमस्ते") || t.includes("hello") || t.includes("hi") || t.includes("हेलो") || t.includes("hii")) return "greeting";
  if (t.includes("आंदोलन") || t.includes("ज़िला") || t.includes("zila") || t.includes("andolan") || t.includes("जानकारी") || t.includes("क्या है") || t.includes("बारे")) return "andolan";
  if (t.includes("follow") || t.includes("फॉलो") || t.includes("like") || t.includes("page")) return "follow";
  if (t.includes("petition") || t.includes("sign") || t.includes("पिटीशन") || t.includes("साइन")) return "petition";
  if (t.includes("share") || t.includes("शेयर") || t.includes("send") || t.includes("भेजें")) return "share";
  if (t.includes("जुड़") || t.includes("जुड़ना") || t.includes("हाँ") || t.includes("yes") || t.includes("कर लिया") || t.includes("✅")) return "joined";
  if (t.includes("शुक्रिया") || t.includes("thanks") || t.includes("thank") || t.includes("धन्यवाद")) return "thanks";
  return "default";
}

function addMessage(text, type) {
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `msg ${type}`;
  if (type === "bot") {
    div.innerHTML = `<div class="msg-avatar">🤖</div><div class="bubble">${text.replace(/\n/g, "<br>")}</div>`;
  } else {
    div.innerHTML = `<div class="bubble">${text}</div>`;
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "msg bot"; div.id = "typing";
  div.innerHTML = `<div class="msg-avatar">🤖</div><div class="typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

function setQuickReplies(buttons) {
  const qr = document.getElementById("quickReplies");
  qr.innerHTML = "";
  buttons.forEach(b => {
    const btn = document.createElement("button");
    btn.className = "qr-btn";
    btn.textContent = b;
    btn.onclick = () => handleUserInput(b);
    qr.appendChild(btn);
  });
}

function handleUserInput(text) {
  addMessage(text, "user");
  document.getElementById("quickReplies").innerHTML = "";
  showTyping();
  setTimeout(() => {
    removeTyping();
    const key = getResponse(text);
    const resp = RESPONSES[key];
    addMessage(resp.text, "bot");
    setQuickReplies(resp.quick);
  }, 900);
}

function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  handleUserInput(text);
}

document.getElementById("userInput").addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

// Start
window.onload = () => {
  setTimeout(() => {
    const r = RESPONSES.greeting;
    addMessage(r.text, "bot");
    setQuickReplies(r.quick);
  }, 500);
};
</script>
</body>
</html>
